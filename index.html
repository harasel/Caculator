<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Learn JS | Calculator project | Class 30</title>

	<!-- BS CDN -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" >

	<!-- Main CSS -->
	<link rel="stylesheet" type="text/css" href="CSS/style.css">
</head>
<body class=" bg-body-secondary">


	<div id="container">

		<div id="calculator">
			
			<div id="result">

				<div id="resultBox">

					<div id="history">
						<p id="history-value"></p>
					</div>

					<div id="output">
						<p id="output-value"></p>
					</div>

				</div>

			</div>

			<div id="keyboard">
				<button class="oparator" id="clear">C</button>
				<button class="oparator" id="backspace">CE</button>
				<button class="oparator" id="%">%</button>
				<button class="oparator" id="/">&#247;</button>

				<button class="number" id="7">7</button>
				<button class="number" id="8">8</button>
				<button class="number" id="9">9</button>
				<button class="oparator" id="*">&times;</button>

				<button class="number" id="4">4</button>
				<button class="number" id="5">5</button>
				<button class="number" id="6">6</button>
				<button class="oparator" id="-">-</button>

				<button class="number" id="1">1</button>
				<button class="number" id="2">2</button>
				<button class="number" id="3">3</button>
				<button class="oparator" id="+">+</button>

				<button class="empty" id="empty">00</button>
				<button class="number" id="0">0</button>
				<button class="empty" id="empty">.</button>
				<button class="oparator" id="=">=</button>

			</div>

		</div>
		
	</div>
	



	<!-- Main JS -->
	<script src="js/script.js"></script>

	<!-- BS JS CDN -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" ></script>

</body>
</html>
